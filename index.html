<!DOCTYPE html>
<html lang="ar">
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLIDA09 IPTV</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#006233,#ffffff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
color:white;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.logo{
font-size:32px;
font-weight:bold;
color:#00ff66;
margin-bottom:10px;
}

.flag{
font-size:40px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
background:#222;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.m3u{
background:#006233;
color:white;
}

.xtream{
background:#d21034;
color:white;
}
</style>
</head>

<body>

<div class="box">

<div class="flag">🇩🇿</div>

<div class="logo">BLIDA09</div>

<h3>IPTV Player</h3>

<input type="text" placeholder="M3U Playlist URL">

<button class="m3u">تفعيل M3U</button>

<hr>

<input type="text" placeholder="Server URL">
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button class="xtream">تفعيل Xtream Codes</button>

</div>

</body>
</html>
